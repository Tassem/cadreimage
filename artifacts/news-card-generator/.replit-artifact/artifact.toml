kind = "web"
previewPath = "/"
title = "مولّد بطاقات الأخبار"
version = "1.0.0"
id = "artifacts/news-card-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19293

[services.development]
run = "pnpm --filter @workspace/news-card-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/news-card-generator", "run", "build" ]
publicDir = "artifacts/news-card-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19293"
BASE_PATH = "/"
