# ============================================================
# News Card Generator Pro — Docker Compose
#
# Services:
#   postgres            PostgreSQL 16
#   api                 Express 5 API + Playwright/Chromium  :8080
#   frontend-generator  Free card generator (nginx)          :3000
#   frontend-pro        Pro dashboard (nginx)                :3001
#
# Quick start:
#   cp .env.example .env
#   docker-compose up -d --build
# ============================================================

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: newscard
      POSTGRES_USER: newscard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newscard"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://newscard:${POSTGRES_PASSWORD:-changeme}@postgres:5432/newscard
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-min-32-chars}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CHROMIUM_PATH: /usr/bin/chromium-browser
    ports:
      - 8082:8080
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    restart: unless-stopped
    ports:
      - 8085:80
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:
