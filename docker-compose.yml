version: "3.9"

# ============================================================
# News Card Generator Pro — Docker Compose
#
# Services:
#   postgres          PostgreSQL 16
#   api               Express 5 API + Playwright/Chromium  :8080
#   frontend-gen      Free card generator (nginx)          :3000
#   frontend-pro      Pro dashboard (nginx)                :3001
#
# Quick start:
#   cp .env.example .env   # fill in your secrets
#   docker-compose up -d
# ============================================================

services:
  # ----------------------------------------------------------
  # Database
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: newscard
      POSTGRES_USER: newscard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newscard"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  # API Server
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://newscard:${POSTGRES_PASSWORD:-changeme}@postgres:5432/newscard
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-min-32-chars}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CHROMIUM_PATH: /usr/bin/chromium-browser
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/artifacts/api-server/uploads

  # ----------------------------------------------------------
  # Free Generator Frontend
  # ----------------------------------------------------------
  frontend-gen:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-gen
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  # ----------------------------------------------------------
  # Pro Dashboard Frontend
  # ----------------------------------------------------------
  frontend-pro:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-pro
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:
